/* ===== READINESS #6 (B) — api fetch plumbing: Bearer token + 401 re-issue =====
   _apiHost()  : prod host from ACES_MANIFEST.config.aces_api_host (or runtime ACES_API_HOST override); reads the SEED directly, NEVER getConfig() (that recurses via _apiGet -> _apiHost).
   _apiGet(path): READ-ONLY GET helper used ONLY when DATA_SOURCE==='api'.
     - attaches the stored Google ID token (ACES_AUTH.token) as `Authorization: Bearer <tok>`.

function _apiGet(path){
