# Carbon Zero (memberscza GCP) — interface Cloud Run deploy.
# Create two Cloud Build triggers in the CZA project pointing at this file:
#   • branch dev  → override _CLOUD_RUN_SERVICE=czagentinterfacedev, _BACKEND_SERVICE=text-agent-backend-dev
#   • branch main → defaults below (prod)
#
# Backend URL is derived from service name + project number so triggers stay portable.

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: australia-southeast2
  _CLOUD_RUN_SERVICE: czagentinterface
  _BACKEND_SERVICE: text-agent-backend
  _SUSTAINABILITY_PLATFORM_URL: https://prograde-sustainability-63gwbzzcdq-km.a.run.app
  _IMAGE_REPO: github.com/membersaces/text_agent_interface

steps:
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        BACKEND_URL="https://${_BACKEND_SERVICE}-$PROJECT_NUMBER.${_REGION}.run.app"
        echo "Building with NEXT_PUBLIC_API_BASE_URL=$${BACKEND_URL}"
        docker build \
          --build-arg "NEXT_PUBLIC_API_BASE_URL=$${BACKEND_URL}" \
          --build-arg "NEXT_PUBLIC_AUTONOMOUS_API_BASE_URL=$${BACKEND_URL}" \
          --build-arg "NEXT_PUBLIC_SUSTAINABILITY_PLATFORM_URL=${_SUSTAINABILITY_PLATFORM_URL}" \
          -t "gcr.io/$PROJECT_ID/${_IMAGE_REPO}:$COMMIT_SHA" \
          .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/${_IMAGE_REPO}:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_CLOUD_RUN_SERVICE}
      - --image
      - gcr.io/$PROJECT_ID/${_IMAGE_REPO}:$COMMIT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --project
      - $PROJECT_ID

images:
  - gcr.io/$PROJECT_ID/${_IMAGE_REPO}:$COMMIT_SHA
